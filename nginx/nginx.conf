# nginx/nginx.conf
# Production-grade reverse proxy with TLS termination.
#
# Development setup:
#   bash nginx/generate_dev_certs.sh   # creates nginx/certs/server.{crt,key}
#   docker compose up nginx
#
# Production setup:
#   Replace nginx/certs/ with real certificates from Let's Encrypt:
#   certbot certonly --standalone -d yourdomain.com
#   cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem nginx/certs/server.crt
#   cp /etc/letsencrypt/live/yourdomain.com/privkey.pem   nginx/certs/server.key

events {
    worker_connections 1024;
}

http {
    # ── Global security headers ───────────────────────────────
    add_header X-Frame-Options        "DENY"                              always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"     always;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # ── Upstream ─────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;          # persistent connections to the FastAPI tier
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt (comment out the return if using certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Modern TLS — TLS 1.2 minimum, TLS 1.3 preferred
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS — tells browsers to only connect via HTTPS for 1 year
        # Remove in development if you switch certs often
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Limit request body size (protects against oversized payload attacks)
        client_max_body_size 2m;

        # ── Proxy all traffic to FastAPI ──────────────────────
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection         "";     # enable keep-alive upstream

            # Real client headers
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            # End-to-end request tracing: nginx generates $request_id if the
            # client didn't provide one; FastAPI's RequestIDMiddleware picks it up.
            proxy_set_header   X-Request-ID       $request_id;

            # Timeouts — generous for LangGraph/Celery polling calls
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    30s;
        }
    }
}
