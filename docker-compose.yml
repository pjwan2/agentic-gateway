services:

  # ── Infrastructure ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB:       deeprouter
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run migrations on first start
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d deeprouter"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application tier ────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # Persist model cache across rebuilds — avoids re-downloading the model
      - model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  celery_worker:
    build: .
    restart: unless-stopped
    env_file: .env
    # --pool=solo: avoids the Python 3.12+ prefork compatibility issue.
    # Scale horizontally by running multiple replicas instead of increasing concurrency.
    command: >
      celery -A workers.celery_worker worker
      --pool=solo
      --loglevel=info
      --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "celery", "-A", "workers.celery_worker", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Edge / TLS termination ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
  model_cache:
