name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: deeprouter

# ──────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ──────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check . --output-format=github

  # ── 2. Unit tests ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (skip slow ML-model tests in CI)
        env:
          ENV: development
          REDIS_URL: redis://localhost:6379/0
          CELERY_BACKEND_URL: redis://localhost:6379/1
          POSTGRES_URL: postgresql://admin:password@localhost:5432/deeprouter
          LITELLM_API_KEY: sk-test-placeholder
          ADMIN_SECRET: test-admin-secret
          DEV_API_KEY: test-dev-key
        run: |
          pytest tests/unit -v --tb=short --fast \
            --junitxml=reports/unit-results.xml \
            --cov=. --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage.xml
          flags: unit
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            reports/unit-results.xml
            reports/coverage.xml

  # ── 3. Integration tests ─────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_DB:       deeprouter
          POSTGRES_USER:     admin
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U admin -d deeprouter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U admin -d deeprouter \
            -f migrations/001_initial_schema.sql

      - name: Start FastAPI server (background)
        env:
          ENV: development
          REDIS_URL: redis://localhost:6379/0
          CELERY_BACKEND_URL: redis://localhost:6379/1
          POSTGRES_URL: postgresql://admin:password@localhost:5432/deeprouter
          LITELLM_API_KEY: sk-test-placeholder
          ADMIN_SECRET: test-admin-secret
          DEV_API_KEY: test-dev-key
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run integration tests
        env:
          ENV: development
          REDIS_URL: redis://localhost:6379/0
          CELERY_BACKEND_URL: redis://localhost:6379/1
          POSTGRES_URL: postgresql://admin:password@localhost:5432/deeprouter
          LITELLM_API_KEY: sk-test-placeholder
          ADMIN_SECRET: test-admin-secret
          DEV_API_KEY: test-dev-key
        run: |
          pytest tests/integration -v --tb=short \
            --junitxml=reports/integration-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-results.xml

  # ── 4. Docker build validation ───────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image health-check binary exists
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            curl --version
